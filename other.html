<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayPilot Pro Scheduler with Hour and Minute Scale</title>
  <!-- DayPilot Pro CSS -->
  <link type="text/css" rel="stylesheet" href="https://javascript.daypilot.org/demo/helpers/v2/main.css?v=2024.3.5967" />
  <style>
    #scheduler {
      width: 100%;
      height: 600px;
    }
    .daypilot-event {
      border-radius: 5px;
      padding: 2px;
    }

    .daypilot-event[data-resource="A"] {
      background-color: #FFDDDD;
      border-color: #FF0000;
    }

    .daypilot-event[data-resource="B"] {
      background-color: #DDFFDD;
      border-color: #00FF00;
    }

    .daypilot-event[data-resource="C"] {
      background-color: #DDDDFF;
      border-color: #0000FF;
    }

    .daypilot-event[data-resource="D"] {
      background-color: #FFFFDD;
      border-color: #FFFF00;
    }
  </style>
</head>
<body>
  <div id="scheduler"></div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- DayPilot Pro JS -->
  <script src="https://javascript.daypilot.org/demo/js/daypilot-all.min.js?v=2024.3.5967"></script>
  <script>
    $(document).ready(function() {
      const scheduler = new DayPilot.Scheduler("scheduler", {
        startDate: "2024-07-03", // Set the start date to the desired date
        days: 1, // Number of days to display
        scale: "CellDuration",
        cellDuration: 5, // Display time slots in 30-minute intervals
        timeHeaders: [
          { groupBy: "Day", format: "ddd" },
          { groupBy: "Hour", format: "h tt" },
          { groupBy: "Cell", format: "mm" }
        ],
        resources: [
          { id: "A", name: "Tutor A" },
          { id: "B", name: "Tutor B" },
          { id: "C", name: "Tutor C" },
          { id: "D", name: "Tutor D" },
          { id: "E", name: "Tutor E" }
        ],
        events: [
          { id: "1", text: "Meeting with Team", start: "2024-07-03T00:13:00", end: "2024-07-03T01:13:00", resource: "A" },
          { id: "2", text: "Meeting with Team", start: "2024-07-03T00:30:00", end: "2024-07-03T01:30:00", resource: "A" },
          { id: "3", text: "Client Call", start: "2024-07-03T12:30:00", end: "2024-07-03T13:00:00", resource: "C" },
          { id: "4", text: "Lunch Break", start: "2024-07-03T13:00:00", end: "2024-07-03T14:00:00", resource: "D" },
          { id: "5", text: "Product Review", start: "2024-07-03T14:30:00", end: "2024-07-03T16:00:00", resource: "E" },
          { id: "6", text: "Team Building", start: "2024-07-03T16:30:00", end: "2024-07-03T18:00:00", resource: "A" },
          { id: "7", text: "Code Review", start: "2024-07-03T18:30:00", end: "2024-07-03T19:00:00", resource: "B" },
          { id: "8", text: "End of Day Wrap-Up", start: "2024-07-03T19:30:00", end: "2024-07-03T20:00:00", resource: "C" },
          { id: "9", text: "Client Presentation", start: "2024-07-03T20:30:00", end: "2024-07-03T22:00:00", resource: "D" },
          { id: "10", text: "Research & Development", start: "2024-07-03T22:30:00", end: "2024-07-03T23:30:00", resource: "E" }
        ],
        onTimeRangeSelected: async args => {
          const modal = await DayPilot.Modal.prompt("New event name:", "Event");
          const name = modal.result;
          scheduler.clearSelection();
          if (!name) return;
          scheduler.events.add({
            start: args.start,
            end: args.end,
            id: DayPilot.guid(),
            resource: args.resource,
            text: name
          });
          scheduler.message("Created");
        }
      });

      scheduler.init();
    });
  </script>
</body>
</html>
